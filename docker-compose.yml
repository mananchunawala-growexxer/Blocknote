version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blocknote
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/Backend/Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=4000
      - WEB_URL=http://localhost:5173
      - API_URL=http://localhost:4000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/blocknote
      - JWT_ACCESS_SECRET=your-super-secret-access-token-key-here-min-32chars
      - JWT_REFRESH_SECRET=your-super-secret-refresh-token-key-here-min32chars
      - ACCESS_TOKEN_TTL=15m
      - REFRESH_TOKEN_TTL=7d
      - SHARE_SESSION_TTL=12h
      - CORS_ORIGIN=http://localhost:5173,http://localhost:3000,https://blocknote-eight.vercel.app
      - LOG_LEVEL=info
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/Backend/src:/app/apps/Backend/src
    command: npm run migrate && npm run dev

  frontend:
    build:
      context: .
      dockerfile: apps/Frontend/Dockerfile
    environment:
      - VITE_API_URL=http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./apps/Frontend/src:/app/apps/Frontend/src

volumes:
  postgres-data:
